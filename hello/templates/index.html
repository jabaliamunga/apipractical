<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        form {
            background-color: #fff;
            padding: 20px;
            max-width: 400px;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        table {
            width: 80%;
            margin: 30px auto;
            border-collapse: collapse;
            background-color: #fff;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>

    <h1>Student Records</h1>

    <form action="http://127.0.0.1:8000/get_students/" method="post">
        {% csrf_token %}
        <input type="text" placeholder="Enter your name" name="name">
        <input type="text" placeholder="Enter your course" name="course">
        <input type="number" name="age" placeholder="Enter your age">
        <button type="submit">Submit</button>
    </form>

    <table>
        <tr>
            <th>Name</th>
            <th>Course</th>
            <th>Age</th>
        </tr>
        {% for x in data %}
        <tr>
            <td>{{ x.name }}</td>
            <td>{{ x.course }}</td>
            <td>{{ x.age }}</td>
            <td>
                <form action="http://127.0.0.1:8000/delete_student/{{ x.id }}/" method="post" style="display:inline;">
                  {% csrf_token %}
                <button type="submit">DELETE</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
